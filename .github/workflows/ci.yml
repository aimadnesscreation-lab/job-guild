name: CI

# Run on every push to main AND every pull request (any branch).
# This ensures every PR is verified before merge — no audit whack-a-mole.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Fast checks first (fail early to save minutes) ────────────────
  quick-checks:
    name: Lint, Format & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # dart format only operates on source files — it never touches
      # Flutter's kernel code, so the standalone Dart is safe here.
      - name: Check formatting
        run: dart format --set-exit-if-changed .

      # flutter analyze uses the Flutter-bundled Dart — same reason.
      - name: Static analysis
        run: flutter analyze --no-pub

  # ─── Tests (only if quick checks pass) ─────────────────────────────
  test:
    name: Unit & Widget Tests
    needs: quick-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # flutter test uses the Flutter-bundled Dart, avoiding the
      # FFI transformer crash (`InvalidType is not a subtype of
      # FunctionType`) that happens with a mismatched standalone Dart.
      - name: Run tests
        run: flutter test --reporter expanded

  # ─── Build checks (only if tests pass) ─────────────────────────────
  build-apk:
    name: Build APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-web:
    name: Build Web
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Web
        run: flutter build web

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
